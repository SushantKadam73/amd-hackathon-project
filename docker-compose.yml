version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: grc-postgres
    environment:
      POSTGRES_USER: grc_user
      POSTGRES_PASSWORD: grc_pass
      POSTGRES_DB: grc_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grc_user -d grc_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
